<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Splash Screens</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 80px;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            width: 100%;
        }

        .box img {
            width: 100%;
            max-width: 350px;
            height: auto;
        }

        #cont {
            display: flex;
            justify-content: center;
        }

        button {
            background: none;
            border: none;
            padding: 0;
        }

        #cont img {
            max-width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="./used img, vdo/rockstar north.png" alt="Rockstar North">
        <img src="./used img, vdo/rockstar R.png" alt="Rockstar Games">
    </div>
    <div id="cont">
        <button>
            <a href="/005.html">
                <img src="./used img, vdo/contionu_button.png" alt="Continue">
            </a>
        </button>
    </div>
</body>
</html>
