<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            background-color: #000;
        }

        /* Fullscreen Video Setup */
        .fullscreen-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Ensures video covers the entire screen without stretching */
            z-index: 1;
        }

        /* Back Button Setup */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10; /* Keeps button above the video */
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 4px;
            transition: background-color 0.3s, color 0.3s;
        }

        .back-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <a href="/006.html" class="back-btn">BACK</a>

    <video class="fullscreen-video" autoplay loop muted playsinline>
        <source src="/used img, vdo/Video_Generation_Loading_Screen_and_Gameplay.mp4" type="video/mp4">
    </video>

</body>
</html>
