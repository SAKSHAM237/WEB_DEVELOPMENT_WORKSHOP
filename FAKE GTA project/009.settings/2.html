<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Menu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Arial Narrow", Arial, sans-serif; 
            overflow: hidden; 
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* Main Wrapper to hold everything */
        .settings-wrapper {
            position: absolute;
            top: 8%;
            left: 5%;
            width: 900px; /* Width for both columns combined */
        }

        .menu-title {
            color: white;
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
        }

        /* Blue bar stretching across both sections */
        .blue-bar {
            background-color: #3b6082; 
            height: 38px;
            width: 100%;
            margin-bottom: 2px;
        }

        /* Flex container for the two columns */
        .content-area {
            display: flex;
            height: 450px; 
        }

        /* Left side menu styles */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            background-color: #000;
            width: 280px;
            flex-shrink: 0;
        }

        .menu-item {
            background-color: rgb(0, 0, 0);
            color: #ffffff;
            text-align: left;
            padding: 12px 15px;
            font-size: 1.15rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #f4f4f4;
            color: #000;
            font-weight: bold;
        }

        /* Right side details panel styles */
        .right-panel {
            flex-grow: 1;
            background-color: rgba(0, 0, 0, 0.55);
            color: #fff;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 1.1rem;
        }

        /* UI Controls (Toggles and Sliders) */
        .toggle-switch {
            display: flex;
            width: 45px;
            height: 18px;
        }
        /* .toggle-switch.on .left { width: 50%; background-color: #4a77a3; }
        .toggle-switch.on .right { width: 50%; background-color: #fff; }
        .toggle-switch.off .left { width: 50%; background-color: #fff; }
        .toggle-switch.off .right { width: 50%; background-color: #555; } */

        .slider-container {
            width: 180px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.2);
        }
        .slider-fill {
            height: 100%;
            background-color: #6da2d8;
        }
        
        /* Bottom scroll indicator arrow */
        .scroll-arrow {
            margin-top: auto;
            text-align: center;
            font-size: 1.2rem;
            color: white;
        }

    </style>
</head>
<body>

    <img src="/used img, vdo/MAIN_MENU.png" class="bg-image" alt="Background">

    <div class="settings-wrapper">
        <h1 class="menu-title">Settings</h1>
        <div class="blue-bar"></div>
        
        <div class="content-area">
            <div class="menu-list">
                <a href="/009.settings/2.html"><button class="menu-item">GAMEPAD</button></a>
   <a href="/009.settings/3.html"> <button class="menu-item" >KEYBOARD/MOUSE</button></a>
   <a href="/009.settings/4.html"> <button class="menu-item">AUDIO</button></a>
   <a href="/009.settings/5.html"> <button class="menu-item" >CAMERA</button></a>
   <a href="/009.settings/6.html"> <button class="menu-item" >DISPLAY</button></a>
   <a href="/009.settings/7.html"> <button class="menu-item" >GRAPHICS</button></a>
   <a href="/009.settings/8.html"> <button class="menu-item" >ONLINE</button></a>
   <a href="/009.settings/9.html"> <button class="menu-item" >SAVING & STARTUP</button></a>
    
   <a href="/006.html"> <button class="menu-item" >BACK</button></a>
            </div>

            <div class="right-panel">
                <div class="detail-row">
                    <span>Controller Layout</span>
                    <span>Gamepad</span>
                </div>
                <div class="detail-row">
                    <span>Vibration</span>
                    <div class="toggle-switch on"><div class="left"></div><div class="right"></div></div>
                </div>
                <div class="detail-row">
                    <span>Invert Look</span>
                    <div class="toggle-switch off"><div class="left"></div><div class="right"></div></div>
                </div>
                <div class="detail-row">
                    <span>Sensitivity</span>
                    <div class="slider-container"><div class="slider-fill" style="width: 70%;"></div></div>
                </div>
                <div class="detail-row">
                    <span>Deadzone</span>
                    <div class="slider-container"><div class="slider-fill" style="width: 20%;"></div></div>
                </div>
                <div class="detail-row">
                    <span>Button Layout</span>
                    <span></span>
                </div>
                <div class="detail-row">
                    <span>Restore Defaults</span>
                    <span></span>
                </div>
                <div class="scroll-arrow">v</div>
            </div>
        </div>
    </div>

</body>
</html>
