<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen Video Styling */
        .fullscreen-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        /* Top Left Back Button Styling */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #fff;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
        }

        .back-button:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <a href="/006.html" class="back-button">Back</a>

    <video class="fullscreen-video" autoplay loop muted playsinline onended="this.play()">
        <source src="/used img, vdo/GTA_V_Video_Generation.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
