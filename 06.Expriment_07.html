<!DOCTYPE html>
<html>
<head>
  <title>React Props Example - Student Information</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    
    .app-container {
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* CSS Styling for the Student Card */
    .student-card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 15px auto;
      width: 250px;
    }

    .student-card h3 {
      color: #1a365d;
      margin-top: 0;
      margin-bottom: 15px;
    }

    .student-card p {
      color: #333;
      margin: 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    // 1. Create the Student component
    // 2. Accept props: name, course, marks
    function Student(props) {
      // 3. Display student details using JSX
      return (
        <div className="student-card">
          <h3>{props.name}</h3>
          <p>Course: {props.course}</p>
          <p>Marks: {props.marks}</p>
        </div>
      );
    }

    function App() {
      // 4. Use the component multiple times with different data
      return (
        <div className="app-container">
          <h2>Student Information</h2>
          <Student name="Rahul Sharma" course="Computer Science" marks="85" />
          <Student name="Anita Verma" course="Information Technology" marks="92" />
          <Student name="Rohan Gupta" course="Electronics" marks="78" />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

</body>
</html>
